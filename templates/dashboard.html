{% extends 'base.html' %}

{% block content %}
<div style="max-width: 800px; margin: 40px auto;">
    <h2 style="color: #e89b2b;">Welcome back, {{ name }}!</h2>
    <p style="color: #ccc; font-size: 1.1em;">Here is your Smart Resume Analyzer dashboard.</p>

    <div style="background-color: #1e2430; padding: 40px; border-radius: 8px; margin-top: 30px; border: 2px dashed #444; text-align: center;">
        <h3 style="margin-bottom: 15px;">Upload Your Resume</h3>
        <p style="color: #888; margin-bottom: 20px;">PDF format supported (Max 5MB)</p>
        
        <form action="#" method="POST" enctype="multipart/form-data">
            <input type="file" name="resume_file" accept=".pdf" style="display: block; margin: 0 auto 20px auto; color: white;">
            <button type="button" style="padding: 10px 25px; background-color: #444; color: #888; border: none; border-radius: 4px; cursor: not-allowed;" disabled>
                Analyze Resume (Coming in Phase 3)
            </button>
        </form>
    </div>
</div>
{% endblock %}
