{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto; background-color: #1e2430; padding: 30px; border-radius: 8px;">
    <h2>Create an Account</h2>
    <form method="POST" action="{{ url_for('register') }}">
        <div style="margin-bottom: 15px;">
            <label>Full Name</label><br>
            <input type="text" name="name" required style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 4px; border: none;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Email Address</label><br>
            <input type="email" name="email" required style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 4px; border: none;">
        </div>
        <div style="margin-bottom: 20px;">
            <label>Password</label><br>
            <input type="password" name="password" required style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 4px; border: none;">
        </div>
        <button type="submit" style="width: 100%; padding: 12px; background-color: #e89b2b; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Sign Up</button>
    </form>
    <p style="text-align: center; margin-top: 15px;">Already have an account? <a href="{{ url_for('login') }}" style="color: #e89b2b;">Login</a></p>
</div>
{% endblock %}
